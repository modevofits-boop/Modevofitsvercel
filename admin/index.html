<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modevofits — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Hanken+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FAFAF8;--panel:#FFF;--ink:#1B1A17;--soft:#8C8980;--mid:#5B5953;--line:#E7E5DF;--line2:#D9D7CF;--ok:#3f7d57;--warn:#9a4a3a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:"Hanken Grotesk",sans-serif;width:100%;background:var(--bg);border:1px solid var(--line2);padding:11px 12px;font-size:14px;color:var(--ink);border-radius:2px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink)}
  label{display:block;font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin-bottom:6px}
  .btn{display:inline-block;font-family:"Jost",sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:12px 22px;border-radius:2px;transition:opacity .2s}
  .btn:hover{opacity:.85}.btn.ghost{background:none;color:var(--mid);border:1px solid var(--line2)}
  .btn.ghost:hover{border-color:var(--ink);color:var(--ink)}.btn.sm{padding:8px 14px;font-size:10px}
  .btn.danger{background:none;color:var(--warn);border:1px solid #e2cfc9}
  .field{margin-bottom:16px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .login{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login .box{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);padding:44px 38px;border-radius:3px}
  .login .brand{font-family:"Jost",sans-serif;font-size:20px;letter-spacing:.4em;text-transform:uppercase;text-align:center;text-indent:.4em;margin-bottom:6px}
  .login .sub{text-align:center;font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--soft);margin-bottom:30px}
  .err{color:var(--warn);font-size:12px;text-align:center;margin-top:14px;min-height:16px}
  .shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  aside{background:#161513;color:#EDEBE5;padding:30px 22px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  aside .brand{font-family:"Jost",sans-serif;font-size:16px;letter-spacing:.36em;text-transform:uppercase;text-indent:.36em}
  aside .tag{font-family:"Jost",sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(237,235,229,.4);margin:4px 0 34px}
  aside nav{display:flex;flex-direction:column;gap:4px;flex:1}
  aside nav button{text-align:left;font-family:"Jost",sans-serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:rgba(237,235,229,.66);padding:12px 14px;border-radius:3px;transition:.2s}
  aside nav button:hover{color:#fff;background:rgba(255,255,255,.05)}
  aside nav button.active{color:#161513;background:#EDEBE5}
  aside .who{font-family:"Jost",sans-serif;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(237,235,229,.4);padding:0 14px 10px}
  aside .out{font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(237,235,229,.5);padding:12px 14px;text-align:left}
  aside .out:hover{color:#fff}
  main{padding:42px clamp(24px,4vw,56px);overflow:auto}
  .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:14px}
  .head h1{font-family:"Jost",sans-serif;font-weight:300;font-size:30px;letter-spacing:.04em;text-transform:uppercase}
  .head .sub{font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft);margin-top:6px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:24px}
  .stat{background:var(--panel);border:1px solid var(--line);padding:22px;border-radius:3px}
  .stat .k{font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft)}
  .stat .v{font-family:"Jost",sans-serif;font-weight:300;font-size:28px;margin-top:10px}
  .stat.warn .v{color:var(--warn)}.stat.good .v{color:var(--ok)}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
  .chartcard{background:var(--panel);border:1px solid var(--line);border-radius:3px;padding:22px}
  .chartcard h3{font-family:"Jost",sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin-bottom:6px}
  .chartcard .big{font-family:"Jost",sans-serif;font-weight:300;font-size:24px;margin-bottom:14px}
  .chartcard svg{width:100%;height:auto;display:block}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:3px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th{font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);text-align:left;padding:16px 18px;border-bottom:1px solid var(--line)}
  td{padding:15px 18px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .pname{font-family:"Jost",sans-serif;letter-spacing:.04em;text-transform:uppercase;font-size:13px}
  .thumb{width:42px;height:52px;background:var(--bg);border:1px solid var(--line);display:inline-grid;place-items:center;vertical-align:middle;margin-right:12px;overflow:hidden;border-radius:2px}
  .thumb svg{width:60%}.thumb img{width:100%;height:100%;object-fit:cover}
  .pill{font-family:"Jost",sans-serif;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;border-radius:30px;display:inline-block}
  .pill.on{background:#e8f0ea;color:var(--ok)}.pill.off{background:#f0ede9;color:var(--soft)}
  .stsel{font-family:"Jost",sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:7px 10px;width:auto;min-width:130px}
  .actions{display:flex;gap:8px;justify-content:flex-end}.muted{color:var(--soft);font-size:12px}
  .scrim{position:fixed;inset:0;background:rgba(27,26,23,.4);opacity:0;visibility:hidden;transition:.25s;z-index:50}
  .scrim.open{opacity:1;visibility:visible}
  .modal{position:fixed;top:0;right:0;height:100%;width:min(520px,96vw);background:var(--bg);z-index:60;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);overflow-y:auto}
  .modal.open{transform:none}
  .modal__h{display:flex;justify-content:space-between;align-items:center;padding:24px 30px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:2}
  .modal__h h2{font-family:"Jost",sans-serif;font-weight:300;font-size:20px;letter-spacing:.04em;text-transform:uppercase}
  .modal__b{padding:26px 30px 40px}.x{font-size:22px;color:var(--soft)}.x:hover{color:var(--ink)}
  .colorrow{display:grid;grid-template-columns:1fr 54px 34px;gap:8px;align-items:center;margin-bottom:8px}
  .colorrow input[type=color]{padding:0;height:40px}
  .check{display:flex;align-items:center;gap:10px;margin-bottom:14px}.check input{width:auto}.check label{margin:0}
  .ordbox{padding:18px;border:1px solid var(--line);border-radius:3px;margin-bottom:14px}
  .ordbox h4{font-family:"Jost",sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:10px}
  .oitem{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--line)}
  .scbox{border:1px solid var(--line2);border-radius:3px;padding:14px;margin-bottom:8px}
  .sccol{display:grid;gap:8px;margin-bottom:10px}
  .scrow{display:grid;gap:8px;align-items:center;margin-bottom:6px}
  .scrow input{padding:8px 10px}
  .miniadd{font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);border:1px dashed var(--line2);padding:8px;width:100%;border-radius:2px}
  .miniadd:hover{border-color:var(--ink);color:var(--ink)}
  .imgsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px}
  .imgthumb{position:relative;aspect-ratio:3/4;border:1px solid var(--line2);border-radius:3px;overflow:hidden;background:var(--bg)}
  .imgthumb img{width:100%;height:100%;object-fit:cover}
  .imgthumb .imgx{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(27,26,23,.78);color:#fff;font-size:14px;display:grid;place-items:center}
  .imgthumb .imgmain{position:absolute;bottom:0;left:0;right:0;font-family:"Jost",sans-serif;font-size:8px;letter-spacing:.12em;text-transform:uppercase;text-align:center;background:var(--ink);color:var(--bg);padding:3px}
  .imgthumb .setmain{position:absolute;bottom:0;left:0;right:0;font-family:"Jost",sans-serif;font-size:8px;letter-spacing:.1em;text-transform:uppercase;text-align:center;background:rgba(255,255,255,.86);color:var(--mid);padding:3px;opacity:0;transition:.15s}
  .imgthumb:hover .setmain{opacity:1}
  .imgthumb.up{display:grid;place-items:center;color:var(--soft);font-size:11px;font-family:"Jost",sans-serif;letter-spacing:.1em}
  .filebtn{display:inline-block;font-family:"Jost",sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;border:1px dashed var(--line2);padding:11px 16px;border-radius:2px;cursor:pointer;color:var(--mid)}
  .filebtn:hover{border-color:var(--ink);color:var(--ink)}
  .catbar{display:grid;grid-template-columns:120px 1fr 70px;gap:12px;align-items:center;margin-bottom:10px;font-size:13px}
  .catbar .track{height:8px;background:var(--bg);border-radius:6px;overflow:hidden}
  .catbar .fill{height:100%;background:var(--ink);opacity:.82}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .toolbar input{max-width:280px}
  @media(max-width:860px){.charts{grid-template-columns:1fr}}
  @media(max-width:760px){.shell{grid-template-columns:1fr}aside{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;gap:10px}aside nav{flex-direction:row;flex-wrap:wrap;flex:1 100%}aside .who{display:none}}
</style>

<body>
<div id="app"></div>
<div class="scrim" id="scrim"></div>
<div class="modal" id="modal"><div id="modalContent"></div></div>
<script>
const $=(s,r=document)=>r.querySelector(s);
function adminUrl(path){ const parts=path.split("/").filter(Boolean); const base=parts[0]; const id=parts[1]; let u="/api/admin?action="+base; if(id) u+="&id="+encodeURIComponent(id); return u; }
const api=(path,opts={})=>fetch(adminUrl(path),{credentials:"same-origin",headers:{"Content-Type":"application/json"},...opts}).then(async r=>{ if(r.status===401){renderLogin();throw new Error("auth");} const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.error||"Error"); return d; });
const money=n=>"₨ "+Number(n||0).toLocaleString("en-PK");
const fdate=t=>new Date(t).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
const garment=(type,hex)=>`<svg viewBox="0 0 200 220" style="color:${hex}"><use href="#${KNOWN.includes(type)?type:"tee"}"/></svg>`;
const KNOWN=["tee","polo","trouser","hoodie","jacket"];
const SPRITE=`<svg width="0" height="0" style="position:absolute">
  <symbol id="tee" viewBox="0 0 200 220"><path d="M62,38 L82,28 Q100,44 118,28 L138,38 L176,72 L156,98 L140,84 L140,196 Q100,202 60,196 L60,84 L44,98 L24,72 Z"/></symbol>
  <symbol id="polo" viewBox="0 0 200 220"><path d="M64,40 L82,30 L88,42 L100,52 L112,42 L118,30 L136,40 L174,74 L155,99 L140,86 L140,196 Q100,202 60,196 L60,86 L45,99 L26,74 Z"/></symbol>
  <symbol id="trouser" viewBox="0 0 200 220"><path d="M66,30 L134,30 L133,58 L116,206 L101,206 L100,104 L99,206 L84,206 L67,58 Z"/></symbol>
  <symbol id="hoodie" viewBox="0 0 200 220"><path d="M62,48 L82,38 Q100,54 118,38 L138,48 L176,82 L156,108 L140,94 L140,196 Q100,202 60,196 L60,94 L44,108 L24,82 Z"/><path d="M82,38 Q100,70 118,38 Q116,22 100,20 Q84,22 82,38 Z" opacity=".3"/><path d="M76,118 H124 V148 Q100,156 76,148 Z" opacity=".26"/></symbol>
  <symbol id="jacket" viewBox="0 0 200 220"><path d="M62,40 L82,30 L100,40 L118,30 L138,40 L176,74 L156,100 L140,86 L140,196 L60,196 L60,86 L44,100 L24,74 Z"/><rect x="98" y="40" width="4" height="156" opacity=".3"/></symbol>
</svg>`;
const SHAPES=[["tee","T-Shirt"],["polo","Polo"],["trouser","Trouser"],["hoodie","Hoodie"],["jacket","Jacket"]];
const STATUSES=["pending","confirmed","shipped","delivered","cancelled"];
let current="dashboard", ME={role:"owner"}, CATS=[];

/* ---------- login ---------- */
function renderLogin(){
  $("#app").innerHTML=`<div class="login"><div class="box">
    <div class="brand">Modevofits</div><div class="sub">Store Admin</div>
    <div class="field"><label>Username</label><input id="lu" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="lp" type="password" autocomplete="current-password"></div>
    <button class="btn" style="width:100%" id="lbtn">Sign in</button><div class="err" id="lerr"></div></div></div>`;
  const submit=async()=>{ $("#lerr").textContent="";
    try{ await fetch("/api/admin?action=login",{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:$("#lu").value,password:$("#lp").value})}).then(async r=>{const d=await r.json();if(!r.ok)throw new Error(d.error);}); boot(); }
    catch(e){ $("#lerr").textContent=e.message||"Login failed"; } };
  $("#lbtn").onclick=submit; $("#lp").addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
}
function renderShell(){
  const manager=ME.role==="owner"||ME.role==="admin";
  let nav=[["dashboard","Dashboard"],["products","Products"],["categories","Categories"],["orders","Orders"]];
  if(manager) nav=nav.concat([["users","Users"],["settings","Settings"]]);
  $("#app").innerHTML=SPRITE+`<div class="shell"><aside>
    <div><div class="brand">Modevofits</div><div class="tag">Store Admin</div></div>
    <nav>${nav.map(([k,l])=>`<button data-nav="${k}" class="${k===current?'active':''}">${l}</button>`).join("")}</nav>
    <div class="who">${ME.username||""} · ${ME.role}</div>
    <a href="/" class="out" target="_blank">View store ↗</a><button class="out" id="logout">Log out</button>
  </aside><main id="view"></main></div>`;
  $("#app").querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>{current=b.dataset.nav;renderShell();route();});
  $("#logout").onclick=async()=>{ await fetch("/api/admin?action=logout",{method:"POST",credentials:"same-origin"}); renderLogin(); };
}
function route(){ ({dashboard:viewDashboard,products:viewProducts,categories:viewCategories,orders:viewOrders,users:viewUsers,settings:viewSettings}[current]||viewDashboard)(); }

/* ---------- image compression + upload ---------- */
function compressImage(file,max=1600,quality=0.82){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file); const img=new Image();
    img.onload=()=>{ URL.revokeObjectURL(url); let w=img.width,h=img.height;
      if(w>max||h>max){ if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
      resolve(cv.toDataURL("image/jpeg",quality)); };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("Couldn't read that image"));};
    img.src=url;
  });
}
async function uploadImage(file){
  const dataUrl=await compressImage(file);
  const r=await fetch("/api/upload",{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({dataUrl,filename:file.name})});
  const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.error||"Upload failed"); return d.url;
}

/* ---------- reusable size-chart editor ---------- */
function sizeEditor(initCols,initRows){
  let cols=JSON.parse(JSON.stringify(initCols&&initCols.length?initCols:["Chest (in)"]));
  let rows=JSON.parse(JSON.stringify(initRows&&initRows.length?initRows:[{size:"M",values:cols.map(()=>"")}]));
  let colsEl,rowsEl;
  function sync(){ rows.forEach(r=>{ while(r.values.length<cols.length)r.values.push(""); r.values.length=cols.length; }); }
  function render(){ sync();
    colsEl.innerHTML=cols.map((c,i)=>`<div class="colorrow" style="grid-template-columns:1fr 34px"><input data-col="${i}" value="${esc(c)}" placeholder="e.g. Chest (in)"><button type="button" class="btn danger sm" data-colx="${i}">×</button></div>`).join("");
    colsEl.querySelectorAll("[data-col]").forEach(inp=>inp.oninput=()=>{cols[+inp.dataset.col]=inp.value;});
    colsEl.querySelectorAll("[data-colx]").forEach(b=>b.onclick=()=>{ if(cols.length<=1)return; cols.splice(+b.dataset.colx,1); render(); });
    rowsEl.innerHTML=rows.map((r,ri)=>`<div class="scrow" style="grid-template-columns:80px ${cols.map(()=>"1fr").join(" ")} 30px"><input data-rs="${ri}" value="${esc(r.size)}" placeholder="Size">${cols.map((_,ci)=>`<input data-rv="${ri}.${ci}" value="${esc(r.values[ci]||"")}" placeholder="—">`).join("")}<button type="button" class="btn danger sm" data-rx="${ri}">×</button></div>`).join("");
    rowsEl.querySelectorAll("[data-rs]").forEach(inp=>inp.oninput=()=>{rows[+inp.dataset.rs].size=inp.value;});
    rowsEl.querySelectorAll("[data-rv]").forEach(inp=>inp.oninput=()=>{const[ri,ci]=inp.dataset.rv.split(".").map(Number);rows[ri].values[ci]=inp.value;});
    rowsEl.querySelectorAll("[data-rx]").forEach(b=>b.onclick=()=>{rows.splice(+b.dataset.rx,1);render();});
  }
  return {
    mount(colsSel,rowsSel,addColSel,addRowSel){ colsEl=$(colsSel); rowsEl=$(rowsSel); $(addColSel).onclick=()=>{cols.push("");render();}; $(addRowSel).onclick=()=>{rows.push({size:"",values:cols.map(()=>"")});render();}; render(); },
    get(){ return { columns: cols.map(c=>c.trim()).filter(Boolean), rows: rows.filter(r=>r.size.trim()).map(r=>({size:r.size.trim(),values:r.values})) }; }
  };
}

/* ---------- charts (hand-built SVG) ---------- */
function lineChart(series){
  const W=560,H=180,pad=28, max=Math.max(1,...series.map(d=>d.revenue));
  const n=series.length, dx=(W-pad*2)/(n-1);
  const pts=series.map((d,i)=>[pad+i*dx, H-pad-(d.revenue/max)*(H-pad*2)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=line+` L ${pad+(n-1)*dx} ${H-pad} L ${pad} ${H-pad} Z`;
  const lbl=i=>series[i].date.slice(5);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#E7E5DF"/>
    <path d="${area}" fill="#1B1A17" opacity=".06"/>
    <path d="${line}" fill="none" stroke="#1B1A17" stroke-width="1.6"/>
    <text x="${pad}" y="${H-8}" font-size="9" fill="#8C8980" font-family="Jost">${lbl(0)}</text>
    <text x="${W/2}" y="${H-8}" font-size="9" fill="#8C8980" font-family="Jost" text-anchor="middle">${lbl(Math.floor(n/2))}</text>
    <text x="${W-pad}" y="${H-8}" font-size="9" fill="#8C8980" font-family="Jost" text-anchor="end">${lbl(n-1)}</text>
  </svg>`;
}
function barChart(series){
  const W=560,H=180,pad=28, max=Math.max(1,...series.map(d=>d.orders));
  const n=series.length, gap=2, bw=(W-pad*2)/n-gap;
  const bars=series.map((d,i)=>{const h=(d.orders/max)*(H-pad*2);const x=pad+i*((W-pad*2)/n);return `<rect x="${x.toFixed(1)}" y="${(H-pad-h).toFixed(1)}" width="${Math.max(1,bw).toFixed(1)}" height="${h.toFixed(1)}" fill="#1B1A17" opacity=".8"/>`;}).join("");
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#E7E5DF"/>${bars}
    <text x="${pad}" y="${H-8}" font-size="9" fill="#8C8980" font-family="Jost">${series[0].date.slice(5)}</text>
    <text x="${W-pad}" y="${H-8}" font-size="9" fill="#8C8980" font-family="Jost" text-anchor="end">${series[n-1].date.slice(5)}</text>
  </svg>`;
}

/* ---------- dashboard ---------- */
async function viewDashboard(){
  const v=$("#view"); v.innerHTML=`<div class="head"><div><h1>Dashboard</h1><div class="sub">Store overview · last 30 days</div></div></div><div class="muted">Loading…</div>`;
  const s=await api("/stats");
  const totalRev30=s.series.reduce((a,d)=>a+d.revenue,0);
  const totalOrd30=s.series.reduce((a,d)=>a+d.orders,0);
  v.innerHTML=`<div class="head"><div><h1>Dashboard</h1><div class="sub">Store overview</div></div></div>
    <div class="stats">
      <div class="stat"><div class="k">Revenue</div><div class="v">${money(s.revenue)}</div></div>
      <div class="stat"><div class="k">Cost of goods</div><div class="v">${money(s.cost)}</div></div>
      <div class="stat good"><div class="k">Profit</div><div class="v">${money(s.profit)}</div></div>

function categoryForm(c){
  const isNew=!c;
  c=c||{name:"",type:"tee",sizeChart:{columns:["Chest (in)","Length (in)"],rows:[{size:"M",values:["",""]}]}};
  let cols=JSON.parse(JSON.stringify(c.sizeChart&&c.sizeChart.columns&&c.sizeChart.columns.length?c.sizeChart.columns:["Chest (in)"]));
  let rows=JSON.parse(JSON.stringify(c.sizeChart&&c.sizeChart.rows&&c.sizeChart.rows.length?c.sizeChart.rows:[{size:"M",values:cols.map(()=>"")}]));
  openModal(isNew?"Add category":"Edit category",`
    <div class="field"><label>Name</label><input id="cf_name" value="${esc(c.name)}" placeholder="e.g. Hoodies"></div>
    <div class="field"><label>Garment shape (graphic)</label><select id="cf_type">${SHAPES.map(([k,l])=>`<option value="${k}" ${k===c.type?'selected':''}>${l}</option>`).join("")}</select></div>
    <label>Size chart</label>
    <div class="scbox">
      <div style="font-family:'Jost';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);margin-bottom:8px">Measurement columns</div>
      <div class="sccol" id="cf_cols"></div>
      <button class="miniadd" id="cf_addcol">+ Add measurement column</button>
      <div style="font-family:'Jost';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);margin:16px 0 8px">Size rows</div>
      <div id="cf_rows"></div>
      <button class="miniadd" id="cf_addrow" style="margin-top:6px">+ Add size row</button>
    </div>
    <button class="btn" style="width:100%;margin-top:14px" id="cf_save">${isNew?'Create category':'Save changes'}</button>
    <div class="err" id="cf_err" style="text-align:center;margin-top:10px"></div>`);
  function syncRowsToCols(){ rows.forEach(r=>{ while(r.values.length<cols.length)r.values.push(""); r.values.length=cols.length; }); }
  function render(){
    syncRowsToCols();
    $("#cf_cols").innerHTML=cols.map((c2,i)=>`<div class="colorrow" style="grid-template-columns:1fr 34px"><input data-col="${i}" value="${esc(c2)}" placeholder="e.g. Chest (in)"><button class="btn danger sm" data-colx="${i}">×</button></div>`).join("");
    $("#cf_cols").querySelectorAll("[data-col]").forEach(inp=>inp.oninput=()=>{cols[+inp.dataset.col]=inp.value;});
    $("#cf_cols").querySelectorAll("[data-colx]").forEach(b=>b.onclick=()=>{ if(cols.length<=1)return; cols.splice(+b.dataset.colx,1); render(); });
    $("#cf_rows").innerHTML=rows.map((r,ri)=>`<div class="scrow" style="grid-template-columns:80px ${cols.map(()=>"1fr").join(" ")} 30px"><input data-rs="${ri}" value="${esc(r.size)}" placeholder="Size">${cols.map((_,ci)=>`<input data-rv="${ri}.${ci}" value="${esc(r.values[ci]||"")}" placeholder="—">`).join("")}<button class="btn danger sm" data-rx="${ri}">×</button></div>`).join("");
    $("#cf_rows").querySelectorAll("[data-rs]").forEach(inp=>inp.oninput=()=>{rows[+inp.dataset.rs].size=inp.value;});
    $("#cf_rows").querySelectorAll("[data-rv]").forEach(inp=>inp.oninput=()=>{const[ri,ci]=inp.dataset.rv.split(".").map(Number);rows[ri].values[ci]=inp.value;});
    $("#cf_rows").querySelectorAll("[data-rx]").forEach(b=>b.onclick=()=>{rows.splice(+b.dataset.rx,1);render();});
  }
  render();
  $("#cf_addcol").onclick=()=>{cols.push("");render();};
  $("#cf_addrow").onclick=()=>{rows.push({size:"",values:cols.map(()=>"")});render();};
  $("#cf_save").onclick=async()=>{
    const name=$("#cf_name").value.trim(); if(!name){$("#cf_err").textContent="Name is required";return;}
    const data={name,type:$("#cf_type").value,sizeChart:{columns:cols.map(c2=>c2.trim()).filter(Boolean),rows:rows.filter(r=>r.size.trim()).map(r=>({size:r.size.trim(),values:r.values}))}};
    try{ if(isNew) await api("/categories",{method:"POST",body:JSON.stringify(data)}); else await api("/categories/"+c.id,{method:"PUT",body:JSON.stringify(data)}); closeModal(); viewCategories(); }
    catch(e){ $("#cf_err").textContent=e.message; }
  };
}

  paint(); $("#osearch").oninput=paint; $("#ofilter").onchange=paint;
}
function orderDetail(o){
  openModal("Order "+o.number,`
    <div class="ordbox"><h4>Customer</h4><div>${o.customer.name}</div><div class="muted">${o.customer.phone}${o.customer.email?' · '+o.customer.email:''}</div><div class="muted" style="margin-top:6px">${o.customer.address}, ${o.customer.city}</div></div>
    <div class="ordbox"><h4>Items</h4>${o.items.map(i=>`<div class="oitem"><span>${i.name} · ${i.color} · ${i.size||''} × ${i.qty}</span><span>${money(i.price*i.qty)}</span></div>`).join("")}
      <div class="oitem" style="border:0;margin-top:8px"><span class="muted">Subtotal</span><span>${money(o.subtotal)}</span></div>
      <div class="oitem" style="border:0"><span class="muted">Delivery (${o.shippingMethod||'standard'})</span><span>${o.shipping===0?'Free':money(o.shipping)}</span></div>
      <div class="oitem" style="border:0;font-family:'Jost'"><span>Total · ${o.payment==='cod'?'COD':'Card'}</span><span>${money(o.total)}</span></div></div>
    <div class="field"><label>Status</label><select id="od_status">${STATUSES.map(s=>`<option ${s===o.status?'selected':''}>${s}</option>`).join("")}</select></div>
    <button class="btn" style="width:100%" id="od_save">Update status</button>`);
  $("#od_save").onclick=async()=>{await api("/orders/"+o.id,{method:"PUT",body:JSON.stringify({status:$("#od_status").value})});closeModal();viewOrders();};
}

/* ---------- settings ---------- */
async function viewSettings(){
  const v=$("#view"); v.innerHTML=`<div class="head"><div><h1>Settings</h1><div class="sub">Store configuration</div></div></div><div class="muted">Loading…</div>`;
  const s=await api("/settings");
  v.querySelector(".muted").outerHTML=`<div class="panel" style="padding:30px;max-width:560px">
    <div class="field"><label>Store name</label><input id="s_name" value="${esc(s.storeName)}"></div>
    <div class="field"><label>Announcement bar</label><input id="s_ann" value="${esc(s.announcement)}"></div>
    <div class="field"><label>WhatsApp number (with country code, e.g. 923001234567)</label><input id="s_wa" value="${esc(s.whatsapp||"")}" placeholder="923001234567"></div>
    <div class="row3"><div class="field"><label>Free delivery over (₨)</label><input id="s_free" type="number" value="${s.freeShippingThreshold}"></div>
      <div class="field"><label>Standard fee (₨)</label><input id="s_fee" type="number" value="${s.shippingFee}"></div>
      <div class="field"><label>Express fee (₨)</label><input id="s_exp" type="number" value="${s.expressFee}"></div></div>
    <button class="btn" id="s_save">Save settings</button><span class="muted" id="s_ok" style="margin-left:14px"></span></div>`;
  $("#s_save").onclick=async()=>{ await api("/settings",{method:"PUT",body:JSON.stringify({storeName:$("#s_name").value,announcement:$("#s_ann").value,whatsapp:$("#s_wa").value.replace(/[^0-9]/g,""),freeShippingThreshold:$("#s_free").value,shippingFee:$("#s_fee").value,expressFee:$("#s_exp").value})}); $("#s_ok").textContent="Saved ✓"; setTimeout(()=>$("#s_ok").textContent="",2000); };
}

/* ---------- modal + boot ---------- */
function openModal(t,b){ $("#modalContent").innerHTML=`<div class="modal__h"><h2>${t}</h2><button class="x" onclick="closeModal()">×</button></div><div class="modal__b">${b}</div>`; $("#modal").classList.add("open"); $("#scrim").classList.add("open"); }
function closeModal(){ $("#modal").classList.remove("open"); $("#scrim").classList.remove("open"); }
$("#scrim").onclick=closeModal;
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
async function boot(){ try{ ME=await api("/me"); renderShell(); route(); }catch{} }
boot();
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modevofits — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Hanken+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FAFAF8;--panel:#FFF;--ink:#1B1A17;--soft:#8C8980;--mid:#5B5953;--line:#E7E5DF;--line2:#D9D7CF;--ok:#3f7d57;--warn:#9a4a3a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hanken Grotesk",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:"Hanken Grotesk",sans-serif;width:100%;background:var(--bg);border:1px solid var(--line2);padding:11px 12px;font-size:14px;color:var(--ink);border-radius:2px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink)}
  label{display:block;font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin-bottom:6px}
  .btn{display:inline-block;font-family:"Jost",sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--bg);padding:12px 22px;border-radius:2px;transition:opacity .2s}
  .btn:hover{opacity:.85}.btn.ghost{background:none;color:var(--mid);border:1px solid var(--line2)}
  .btn.ghost:hover{border-color:var(--ink);color:var(--ink)}.btn.sm{padding:8px 14px;font-size:10px}
  .btn.danger{background:none;color:var(--warn);border:1px solid #e2cfc9}
  .field{margin-bottom:16px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .login{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login .box{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);padding:44px 38px;border-radius:3px}
  .login .brand{font-family:"Jost",sans-serif;font-size:20px;letter-spacing:.4em;text-transform:uppercase;text-align:center;text-indent:.4em;margin-bottom:6px}
  .login .sub{text-align:center;font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--soft);margin-bottom:30px}
  .err{color:var(--warn);font-size:12px;text-align:center;margin-top:14px;min-height:16px}
  .shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  aside{background:#161513;color:#EDEBE5;padding:30px 22px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  aside .brand{font-family:"Jost",sans-serif;font-size:16px;letter-spacing:.36em;text-transform:uppercase;text-indent:.36em}
  aside .tag{font-family:"Jost",sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(237,235,229,.4);margin:4px 0 34px}
  aside nav{display:flex;flex-direction:column;gap:4px;flex:1}
  aside nav button{text-align:left;font-family:"Jost",sans-serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:rgba(237,235,229,.66);padding:12px 14px;border-radius:3px;transition:.2s}
  aside nav button:hover{color:#fff;background:rgba(255,255,255,.05)}
  aside nav button.active{color:#161513;background:#EDEBE5}
  aside .out{font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(237,235,229,.5);padding:12px 14px;text-align:left}
  aside .out:hover{color:#fff}
  main{padding:42px clamp(24px,4vw,56px);overflow:auto}
  .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:14px}
  .head h1{font-family:"Jost",sans-serif;font-weight:300;font-size:30px;letter-spacing:.04em;text-transform:uppercase}
  .head .sub{font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft);margin-top:6px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:34px}
  .stat{background:var(--panel);border:1px solid var(--line);padding:24px;border-radius:3px}
  .stat .k{font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft)}
  .stat .v{font-family:"Jost",sans-serif;font-weight:300;font-size:30px;margin-top:10px}
  .stat.warn .v{color:var(--warn)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:3px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th{font-family:"Jost",sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);text-align:left;padding:16px 18px;border-bottom:1px solid var(--line)}
  td{padding:15px 18px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .pname{font-family:"Jost",sans-serif;letter-spacing:.04em;text-transform:uppercase;font-size:13px}
  .thumb{width:42px;height:52px;background:var(--bg);border:1px solid var(--line);display:inline-grid;place-items:center;vertical-align:middle;margin-right:12px;overflow:hidden;border-radius:2px}
  .thumb svg{width:60%}.thumb img{width:100%;height:100%;object-fit:cover}
  .pill{font-family:"Jost",sans-serif;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;border-radius:30px;display:inline-block}
  .pill.on{background:#e8f0ea;color:var(--ok)}.pill.off{background:#f0ede9;color:var(--soft)}
  .stsel{font-family:"Jost",sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:7px 10px;width:auto;min-width:130px}
  .actions{display:flex;gap:8px;justify-content:flex-end}.muted{color:var(--soft);font-size:12px}
  .scrim{position:fixed;inset:0;background:rgba(27,26,23,.4);opacity:0;visibility:hidden;transition:.25s;z-index:50}
  .scrim.open{opacity:1;visibility:visible}
  .modal{position:fixed;top:0;right:0;height:100%;width:min(480px,94vw);background:var(--bg);z-index:60;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);overflow-y:auto}
  .modal.open{transform:none}
  .modal__h{display:flex;justify-content:space-between;align-items:center;padding:24px 30px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:2}
  .modal__h h2{font-family:"Jost",sans-serif;font-weight:300;font-size:20px;letter-spacing:.04em;text-transform:uppercase}
  .modal__b{padding:26px 30px 40px}.x{font-size:22px;color:var(--soft)}.x:hover{color:var(--ink)}
  .colorrow{display:grid;grid-template-columns:1fr 54px 34px;gap:8px;align-items:center;margin-bottom:8px}
  .colorrow input[type=color]{padding:0;height:40px}
  .check{display:flex;align-items:center;gap:10px;margin-bottom:14px}.check input{width:auto}.check label{margin:0}
  .ordbox{padding:18px;border:1px solid var(--line);border-radius:3px;margin-bottom:14px}
  .ordbox h4{font-family:"Jost",sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:10px}
  .oitem{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--line)}
  @media(max-width:760px){.shell{grid-template-columns:1fr}aside{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;gap:10px}aside nav{flex-direction:row;flex-wrap:wrap;flex:1 100%}}
</style>
</head>
<body>
<div id="app"></div>
<div class="scrim" id="scrim"></div>
<div class="modal" id="modal"><div id="modalContent"></div></div>
<script>
const $=(s,r=document)=>r.querySelector(s);
function adminUrl(path){ const parts=path.split("/").filter(Boolean); const base=parts[0]; const id=parts[1]; let u="/api/admin?action="+base; if(id) u+="&id="+encodeURIComponent(id); return u; }
const api=(path,opts={})=>fetch(adminUrl(path),{credentials:"same-origin",headers:{"Content-Type":"application/json"},...opts}).then(async r=>{ if(r.status===401){renderLogin();throw new Error("auth");} const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.error||"Error"); return d; });
const money=n=>"₨ "+Number(n||0).toLocaleString("en-PK");
const fdate=t=>new Date(t).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
const garment=(type,hex)=>`<svg viewBox="0 0 200 220" style="color:${hex}"><use href="#${type}"/></svg>`;
const SPRITE=`<svg width="0" height="0" style="position:absolute"><symbol id="tee" viewBox="0 0 200 220"><path d="M62,38 L82,28 Q100,44 118,28 L138,38 L176,72 L156,98 L140,84 L140,196 Q100,202 60,196 L60,84 L44,98 L24,72 Z"/></symbol><symbol id="polo" viewBox="0 0 200 220"><path d="M64,40 L82,30 L88,42 L100,52 L112,42 L118,30 L136,40 L174,74 L155,99 L140,86 L140,196 Q100,202 60,196 L60,86 L45,99 L26,74 Z"/></symbol><symbol id="trouser" viewBox="0 0 200 220"><path d="M66,30 L134,30 L133,58 L116,206 L101,206 L100,104 L99,206 L84,206 L67,58 Z"/></symbol></svg>`;
const CATS=["Polo Shirts","T-Shirts","Trousers"], TYPES=[["tee","T-Shirt"],["polo","Polo"],["trouser","Trouser"]], STATUSES=["pending","confirmed","shipped","delivered","cancelled"];
let current="dashboard";

function renderLogin(){
  $("#app").innerHTML=`<div class="login"><div class="box">
    <div class="brand">Modevofits</div><div class="sub">Store Admin</div>
    <div class="field"><label>Username</label><input id="lu" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="lp" type="password" autocomplete="current-password"></div>
    <button class="btn" style="width:100%" id="lbtn">Sign in</button><div class="err" id="lerr"></div></div></div>`;
  const submit=async()=>{ $("#lerr").textContent="";
    try{ await fetch("/api/admin?action=login",{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:$("#lu").value,password:$("#lp").value})}).then(async r=>{const d=await r.json();if(!r.ok)throw new Error(d.error);}); boot(); }
    catch(e){ $("#lerr").textContent=e.message||"Login failed"; } };
  $("#lbtn").onclick=submit; $("#lp").addEventListener("keydown",e=>{if(e.key==="Enter")submit();});
}
function renderShell(){
  const nav=[["dashboard","Dashboard"],["products","Products"],["orders","Orders"],["settings","Settings"]];
  $("#app").innerHTML=SPRITE+`<div class="shell"><aside>
    <div><div class="brand">Modevofits</div><div class="tag">Store Admin</div></div>
    <nav>${nav.map(([k,l])=>`<button data-nav="${k}" class="${k===current?'active':''}">${l}</button>`).join("")}</nav>
    <a href="/" class="out" target="_blank">View store ↗</a><button class="out" id="logout">Log out</button>
  </aside><main id="view"></main></div>`;
  $("#app").querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>{current=b.dataset.nav;renderShell();route();});
  $("#logout").onclick=async()=>{ await fetch("/api/admin?action=logout",{method:"POST",credentials:"same-origin"}); renderLogin(); };
}
function route(){ ({dashboard:viewDashboard,products:viewProducts,orders:viewOrders,settings:viewSettings}[current]||viewDashboard)(); }

async function viewDashboard(){
  const v=$("#view"); v.innerHTML=`<div class="head"><div><h1>Dashboard</h1><div class="sub">Store overview</div></div></div><div class="muted">Loading…</div>`;
  const s=await api("/stats");
  v.innerHTML=`<div class="head"><div><h1>Dashboard</h1><div class="sub">Store overview</div></div></div>
    <div class="stats">
      <div class="stat"><div class="k">Revenue</div><div class="v">${money(s.revenue)}</div></div>
      <div class="stat"><div class="k">Orders</div><div class="v">${s.orderCount}</div></div>
      <div class="stat ${s.pending?'warn':''}"><div class="k">Pending</div><div class="v">${s.pending}</div></div>
      <div class="stat"><div class="k">Products</div><div class="v">${s.productCount}</div></div>
      <div class="stat ${s.lowStock?'warn':''}"><div class="k">Low stock</div><div class="v">${s.lowStock}</div></div>
    </div>
    <div class="panel"><table><thead><tr><th>Order</th><th>Date</th><th>Customer</th><th>Total</th><th>Status</th></tr></thead><tbody>
      ${s.recentOrders.length?s.recentOrders.map(o=>`<tr><td class="pname">${o.number}</td><td class="muted">${fdate(o.createdAt)}</td><td>${o.customer.name}</td><td>${money(o.total)}</td><td><span class="pill ${o.status==='pending'?'off':'on'}">${o.status}</span></td></tr>`).join(""):`<tr><td colspan="5" class="muted" style="padding:34px;text-align:center">No orders yet</td></tr>`}
    </tbody></table></div>`;
}
async function viewProducts(){
  const v=$("#view"); v.innerHTML=`<div class="head"><div><h1>Products</h1><div class="sub">Manage catalogue & stock</div></div><button class="btn" id="addP">+ Add product</button></div><div class="muted">Loading…</div>`;
  $("#addP").onclick=()=>productForm(null);
  const list=await api("/products");
  v.querySelector(".muted").outerHTML=`<div class="panel"><table><thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th></th></tr></thead><tbody>
    ${list.map(p=>`<tr>
      <td><span class="thumb">${p.image?`<img src="${p.image}">`:garment(p.type,p.colors[0]?.hex||"#1B1A17")}</span><span class="pname">${p.name}</span></td>
      <td class="muted">${p.category}</td>
      <td>${money(p.price)} ${p.compareAt>p.price?`<span class="muted" style="text-decoration:line-through">${money(p.compareAt)}</span>`:""}</td>
      <td style="${p.stock<=5?'color:var(--warn)':''}">${p.stock}</td>
      <td><span class="pill ${p.active?'on':'off'}">${p.active?'Active':'Hidden'}</span>${p.featured?' <span class="pill off">Featured</span>':''}</td>
      <td><div class="actions"><button class="btn ghost sm" data-edit="${p.id}">Edit</button><button class="btn danger sm" data-del="${p.id}">Delete</button></div></td>
    </tr>`).join("")}</tbody></table></div>`;
  v.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>productForm(list.find(x=>x.id===b.dataset.edit)));
  v.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{ const p=list.find(x=>x.id===b.dataset.del); if(!confirm(`Delete "${p.name}"?`))return; await api("/products/"+p.id,{method:"DELETE"}); viewProducts(); });
}
function productForm(p){
  const isNew=!p;
  p=p||{name:"",category:"T-Shirts",type:"tee",price:"",compareAt:"",stock:"",image:"",desc:"",colors:[{name:"Black",hex:"#1B1A17"}],active:true,featured:false};
  openModal(isNew?"Add product":"Edit product",`
    <div class="field"><label>Name</label><input id="pf_name" value="${esc(p.name)}"></div>
    <div class="row2"><div class="field"><label>Category</label><select id="pf_cat">${CATS.map(c=>`<option ${c===p.category?'selected':''}>${c}</option>`).join("")}</select></div>
      <div class="field"><label>Garment shape</label><select id="pf_type">${TYPES.map(([k,l])=>`<option value="${k}" ${k===p.type?'selected':''}>${l}</option>`).join("")}</select></div></div>
    <div class="row2"><div class="field"><label>Price (₨)</label><input id="pf_price" type="number" value="${p.price}"></div>
      <div class="field"><label>Compare-at (₨)</label><input id="pf_compare" type="number" value="${p.compareAt}"></div></div>
    <div class="row2"><div class="field"><label>Stock</label><input id="pf_stock" type="number" value="${p.stock}"></div>
      <div class="field"><label>Image URL (optional)</label><input id="pf_image" value="${esc(p.image)}" placeholder="https://…"></div></div>
    <div class="field"><label>Description</label><textarea id="pf_desc" rows="3">${esc(p.desc||p.description||"")}</textarea></div>
    <div class="field"><label>Colours</label><div id="pf_colors"></div><button class="btn ghost sm" id="addColor" style="margin-top:8px">+ Add colour</button></div>
    <div class="check"><input type="checkbox" id="pf_active" ${p.active?'checked':''}><label for="pf_active">Active (visible in store)</label></div>
    <div class="check"><input type="checkbox" id="pf_featured" ${p.featured?'checked':''}><label for="pf_featured">Featured on home page</label></div>
    <button class="btn" style="width:100%;margin-top:10px" id="pf_save">${isNew?'Create product':'Save changes'}</button>
    <div class="err" id="pf_err" style="text-align:center;margin-top:10px"></div>`);
  const colorsEl=$("#pf_colors");
  let cols=JSON.parse(JSON.stringify(p.colors&&p.colors.length?p.colors:[{name:"Black",hex:"#1B1A17"}]));
  function rc(){ colorsEl.innerHTML=cols.map((c,i)=>`<div class="colorrow"><input data-cn="${i}" value="${esc(c.name)}" placeholder="Colour name"><input type="color" data-ch="${i}" value="${c.hex}"><button class="btn danger sm" data-cx="${i}">×</button></div>`).join(""); colorsEl.querySelectorAll("[data-cx]").forEach(b=>b.onclick=()=>{cols.splice(+b.dataset.cx,1);rc();}); }
  rc();
  $("#addColor").onclick=()=>{cols.push({name:"",hex:"#888888"});rc();};
  $("#pf_save").onclick=async()=>{
    cols=[...colorsEl.querySelectorAll(".colorrow")].map(r=>({name:r.querySelector("[data-cn]").value.trim(),hex:r.querySelector("[data-ch]").value})).filter(c=>c.name);
    const data={name:$("#pf_name").value.trim(),category:$("#pf_cat").value,type:$("#pf_type").value,price:$("#pf_price").value,compareAt:$("#pf_compare").value,stock:$("#pf_stock").value,image:$("#pf_image").value.trim(),desc:$("#pf_desc").value.trim(),colors:cols,active:$("#pf_active").checked,featured:$("#pf_featured").checked};
    if(!data.name){$("#pf_err").textContent="Name is required";return;}
    if(!data.colors.length){$("#pf_err").textContent="Add at least one colour";return;}
    try{ if(isNew) await api("/products",{method:"POST",body:JSON.stringify(data)}); else await api("/products/"+p.id,{method:"PUT",body:JSON.stringify(data)}); closeModal(); viewProducts(); }
    catch(e){ $("#pf_err").textContent=e.message; }
  };
}
async function viewOrders(){
  const v=$("#view"); v.innerHTML=`<div class="head"><div><h1>Orders</h1><div class="sub">Fulfil & track</div></div></div><div class="muted">Loading…</div>`;
  const list=await api("/orders");
  v.querySelector(".muted").outerHTML=`<div class="panel"><table><thead><tr><th>Order</th><th>Date</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody>
    ${list.length?list.map(o=>`<tr><td class="pname">${o.number}</td><td class="muted">${fdate(o.createdAt)}</td><td>${o.customer.name}<div class="muted">${o.customer.city}</div></td><td class="muted">${o.items.reduce((s,i)=>s+i.qty,0)}</td><td>${money(o.total)}</td><td><select class="stsel" data-status="${o.id}">${STATUSES.map(s=>`<option ${s===o.status?'selected':''}>${s}</option>`).join("")}</select></td><td><div class="actions"><button class="btn ghost sm" data-view="${o.id}">View</button></div></td></tr>`).join(""):`<tr><td colspan="7" class="muted" style="padding:40px;text-align:center">No orders yet</td></tr>`}
  </tbody></table></div>`;
  v.querySelectorAll("[data-status]").forEach(sel=>sel.onchange=async()=>{try{await api("/orders/"+sel.dataset.status,{method:"PUT",body:JSON.stringify({status:sel.value})});}catch(e){alert(e.message);}});
  v.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>orderDetail(list.find(x=>x.id===b.dataset.view)));
}
function orderDetail(o){
  openModal("Order "+o.number,`
    <div class="ordbox"><h4>Customer</h4><div>${o.customer.name}</div><div class="muted">${o.customer.phone}${o.customer.email?' · '+o.customer.email:''}</div><div class="muted" style="margin-top:6px">${o.customer.address}, ${o.customer.city}</div></div>
    <div class="ordbox"><h4>Items</h4>${o.items.map(i=>`<div class="oitem"><span>${i.name} · ${i.color} · ${i.size||''} × ${i.qty}</span><span>${money(i.price*i.qty)}</span></div>`).join("")}
      <div class="oitem" style="border:0;margin-top:8px"><span class="muted">Subtotal</span><span>${money(o.subtotal)}</span></div>
      <div class="oitem" style="border:0"><span class="muted">Delivery (${o.shippingMethod||'standard'})</span><span>${o.shipping===0?'Free':money(o.shipping)}</span></div>
      <div class="oitem" style="border:0;font-family:'Jost'"><span>Total · ${o.payment==='cod'?'COD':'Card'}</span><span>${money(o.total)}</span></div></div>
    <div class="field"><label>Status</label><select id="od_status">${STATUSES.map(s=>`<option ${s===o.status?'selected':''}>${s}</option>`).join("")}</select></div>
    <button class="btn" style="width:100%" id="od_save">Update status</button>`);
  $("#od_save").onclick=async()=>{await api("/orders/"+o.id,{method:"PUT",body:JSON.stringify({status:$("#od_status").value})});closeModal();viewOrders();};
}
async function viewSettings(){
  const v=$("#view"); v.innerHTML=`<div class="head"><div><h1>Settings</h1><div class="sub">Store configuration</div></div></div><div class="muted">Loading…</div>`;
  const s=await api("/settings");
  v.querySelector(".muted").outerHTML=`<div class="panel" style="padding:30px;max-width:560px">
    <div class="field"><label>Store name</label><input id="s_name" value="${esc(s.storeName)}"></div>
    <div class="field"><label>Announcement bar</label><input id="s_ann" value="${esc(s.announcement)}"></div>
    <div class="row2"><div class="field"><label>Free delivery over (₨)</label><input id="s_free" type="number" value="${s.freeShippingThreshold}"></div>
      <div class="field"><label>Standard delivery fee (₨)</label><input id="s_fee" type="number" value="${s.shippingFee}"></div></div>
    <div class="field"><label>Express delivery fee (₨)</label><input id="s_exp" type="number" value="${s.expressFee}"></div>
    <button class="btn" id="s_save">Save settings</button><span class="muted" id="s_ok" style="margin-left:14px"></span></div>`;
  $("#s_save").onclick=async()=>{ await api("/settings",{method:"PUT",body:JSON.stringify({storeName:$("#s_name").value,announcement:$("#s_ann").value,freeShippingThreshold:$("#s_free").value,shippingFee:$("#s_fee").value,expressFee:$("#s_exp").value})}); $("#s_ok").textContent="Saved ✓"; setTimeout(()=>$("#s_ok").textContent="",2000); };
}
function openModal(t,b){ $("#modalContent").innerHTML=`<div class="modal__h"><h2>${t}</h2><button class="x" onclick="closeModal()">×</button></div><div class="modal__b">${b}</div>`; $("#modal").classList.add("open"); $("#scrim").classList.add("open"); }
function closeModal(){ $("#modal").classList.remove("open"); $("#scrim").classList.remove("open"); }
$("#scrim").onclick=closeModal;
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
